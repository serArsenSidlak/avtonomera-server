name: Build AutoCheck DB converter
on:
  workflow_dispatch:
  push:
    paths:
      - 'autocheck/build_db.py'
      - '.github/workflows/build-builddb.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyinstaller

      - name: Build exe
        working-directory: autocheck
        run: pyinstaller --onefile --name BuildAutoCheckDB build_db.py

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: builddb-latest
          name: Автономера — конвертер дампів МВС у базу
          files: autocheck/dist/BuildAutoCheckDB.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
