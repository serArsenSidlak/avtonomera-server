name: Build Chrome extension
on:
  workflow_dispatch:
  push:
    paths:
      - 'extension/**'
      - '.github/workflows/build-extension.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          cd extension
          zip -r ../avtonomera-extension.zip . -x '*.DS_Store'

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ext-latest
          name: Автономера — Chrome extension (opendata збирач)
          files: avtonomera-extension.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
